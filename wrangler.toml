name = "task-tracker-bot"
main = "worker.js"
compatibility_date = "2026-07-01"

# Cron: каждые 15 минут — проверка напоминаний;
# рассылка по будням в 8:00 МСК происходит внутри этого же запуска
[triggers]
crons = ["*/15 * * * *"]

# Привязка KV-хранилища (ID — из Cloudflare: Storage & Databases → KV → TASKS)
[[kv_namespaces]]
binding = "TASKS"
id = "10b3c48fb57a48adbd3cbd1384e2680a"

# Секреты BOT_TOKEN и SECRET остаются в настройках воркера в Cloudflare
