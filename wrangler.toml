name = "task-tracker-bot"
main = "worker.js"
compatibility_date = "2026-07-01"

# Привязка KV-хранилища.
# ID возьми в Cloudflare: Workers & Pages → KV → namespace TASKS → скопировать ID
[[kv_namespaces]]
binding = "TASKS"
id = "10b3c48fb57a48adbd3cbd1384e2680a"

# Секреты BOT_TOKEN и SECRET здесь НЕ указываются —
# они остаются в настройках воркера (Settings → Variables and Secrets)
# и сохраняются при каждом деплое.
